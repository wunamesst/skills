<svg width="100%" viewBox="0 0 680 600" role="img"
  xmlns="http://www.w3.org/2000/svg">
  <title>DDD 分层架构图</title>
  <desc>展示 DDD 四层架构：Interfaces 接口层、Application 应用层、Domain 领域层（核心）、Infrastructure 基础设施层，以及外部客户端与数据源</desc>
  <defs>
    <style>
      svg{font-family:"Anthropic Sans",-apple-system,system-ui,"Segoe UI",sans-serif}
      :root{--b:rgba(31,30,29,.3);--bg2:#F5F4ED;--s:#3D3D3A}
      .t{font-size:16px;font-weight:400;fill:var(--s)}
      .ts{font-size:12px;font-weight:400;fill:var(--s)}
      .th{font-size:14px;font-weight:500}
      .c-blue>rect,.c-blue>circle,.c-blue>ellipse{fill:#E6F1FB;stroke:#185FA5}
      .c-blue>.th{fill:#0C447C}.c-blue>.ts{fill:#185FA5}
      .c-purple>rect,.c-purple>circle,.c-purple>ellipse{fill:#EEEDFE;stroke:#534AB7}
      .c-purple>.th{fill:#3C3489}.c-purple>.ts{fill:#534AB7}
      .c-amber>rect,.c-amber>circle,.c-amber>ellipse{fill:#FAEEDA;stroke:#854F0B}
      .c-amber>.th{fill:#633806}.c-amber>.ts{fill:#854F0B}
      @media(prefers-color-scheme:dark){
        :root{--b:rgba(224,225,226,.3);--bg2:#2A2A28;--s:#B0B0AD}
        .c-blue>rect,.c-blue>circle,.c-blue>ellipse{fill:#0D2640;stroke:#3A8CD0}
        .c-blue>.th{fill:#7AB8E8}.c-blue>.ts{fill:#3A8CD0}
        .c-purple>rect,.c-purple>circle,.c-purple>ellipse{fill:#1E1C3D;stroke:#7A70D0}
        .c-purple>.th{fill:#ADA5F0}.c-purple>.ts{fill:#7A70D0}
        .c-amber>rect,.c-amber>circle,.c-amber>ellipse{fill:#33230A;stroke:#C49020}
        .c-amber>.th{fill:#E0B850}.c-amber>.ts{fill:#C49020}
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-thin" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
        stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 外部：客户端 -->
  <g class="c-amber">
    <rect x="260" y="8" width="160" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="340" y="26" text-anchor="middle" dominant-baseline="central">客户端 / 浏览器</text>
  </g>

  <!-- 请求入口箭头 -->
  <line x1="340" y1="44" x2="340" y2="82" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="352" y="65" text-anchor="start">请求入口</text>

  <!-- 系统边界 -->
  <g class="c-blue">
    <rect x="60" y="50" width="560" height="440" rx="20" stroke-width="0.5"/>
    <text class="th" x="340" y="75" text-anchor="middle" dominant-baseline="central">DDD 分层架构</text>
  </g>

  <!-- Layer 1: Interfaces 接口层 -->
  <g class="c-amber">
    <rect x="84" y="90" width="512" height="72" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="112" text-anchor="middle" dominant-baseline="central">Interfaces 接口层</text>
    <text class="ts" x="340" y="136" text-anchor="middle" dominant-baseline="central">REST API · Controller · DTO · Validator</text>
  </g>

  <!-- 层间依赖箭头：Interfaces → Application -->
  <line x1="340" y1="162" x2="340" y2="174" stroke="#888780" stroke-width="1" marker-end="url(#arrow-thin)"/>

  <!-- Layer 2: Application 应用层 -->
  <g class="c-blue">
    <rect x="84" y="178" width="512" height="88" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="200" text-anchor="middle" dominant-baseline="central">Application 应用层</text>
    <text class="ts" x="340" y="228" text-anchor="middle" dominant-baseline="central">Application Service · Command / Query · Event Handler</text>
  </g>

  <!-- 层间依赖箭头：Application → Domain -->
  <line x1="340" y1="266" x2="340" y2="278" stroke="#888780" stroke-width="1" marker-end="url(#arrow-thin)"/>

  <!-- Layer 3: Domain 领域层（核心，紫色高亮） -->
  <g class="c-purple">
    <rect x="84" y="282" width="512" height="108" rx="8" stroke-width="1"/>
    <text class="th" x="340" y="304" text-anchor="middle" dominant-baseline="central">Domain 领域层  ◂ 核心</text>
    <text class="ts" x="340" y="330" text-anchor="middle" dominant-baseline="central">Entity · Value Object · Aggregate · Domain Service</text>
    <text class="ts" x="340" y="350" text-anchor="middle" dominant-baseline="central">Domain Event · Repository Interface · Specification</text>
  </g>

  <!-- 层间依赖箭头：Domain ← Infrastructure（基础设施实现领域接口） -->
  <line x1="340" y1="390" x2="340" y2="402" stroke="#888780" stroke-width="1" marker-end="url(#arrow-thin)"/>

  <!-- Layer 4: Infrastructure 基础设施层 -->
  <g class="c-blue">
    <rect x="84" y="406" width="512" height="72" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="428" text-anchor="middle" dominant-baseline="central">Infrastructure 基础设施层</text>
    <text class="ts" x="340" y="452" text-anchor="middle" dominant-baseline="central">Repository Impl · ORM · Cache · MQ Client</text>
  </g>

  <!-- 外部：数据存储 -->
  <g class="c-amber">
    <rect x="100" y="510" width="200" height="44" rx="6" stroke-width="0.5"/>
    <text class="th" x="200" y="526" text-anchor="middle" dominant-baseline="central">数据库 · Cache</text>
    <text class="ts" x="200" y="542" text-anchor="middle" dominant-baseline="central">MySQL / Redis</text>
  </g>

  <!-- 外部：外部服务 -->
  <g class="c-amber">
    <rect x="380" y="510" width="200" height="44" rx="6" stroke-width="0.5"/>
    <text class="th" x="480" y="526" text-anchor="middle" dominant-baseline="central">外部 API · 消息队列</text>
    <text class="ts" x="480" y="542" text-anchor="middle" dominant-baseline="central">第三方服务 / Kafka</text>
  </g>

  <!-- Infrastructure → 数据库 -->
  <line x1="200" y1="478" x2="200" y2="508" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Infrastructure → 外部服务 -->
  <line x1="480" y1="478" x2="480" y2="508" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- 依赖方向标注 -->
  <text class="ts" x="640" y="162" text-anchor="end" fill="var(--s)" transform="rotate(-90 640 162)">依赖方向 ↓</text>

  <!-- 依赖关系说明 -->
  <text class="ts" x="340" y="585" text-anchor="middle" fill="var(--s)">Interfaces → Application → Domain（外层依赖内层） ｜ Infrastructure 实现 Domain 定义的接口</text>
</svg>
