<svg width="100%" viewBox="0 0 680 572" role="img"
  xmlns="http://www.w3.org/2000/svg">
  <title>TMS同步 → IMM转码 → 定时回写详情（子流程）</title>
  <desc>Completion完成后同步TMS、发起IMM转码任务、定时任务拉取结果并回写video表和task表</desc>
  <defs>
    <style>
      svg{font-family:"Anthropic Sans",-apple-system,system-ui,"Segoe UI",sans-serif}
      :root{--b:rgba(31,30,29,.3);--bg2:#F5F4ED;--s:#3D3D3A}
      .t{font-size:16px;font-weight:400;fill:var(--s)}
      .ts{font-size:12px;font-weight:400;fill:var(--s)}
      .th{font-size:14px;font-weight:500}
      .c-purple>rect,.c-purple>circle,.c-purple>ellipse{fill:#EEEDFE;stroke:#534AB7}
      .c-purple>.th{fill:#3C3489}.c-purple>.ts{fill:#534AB7}
      .c-amber>rect,.c-amber>circle,.c-amber>ellipse{fill:#FAEEDA;stroke:#854F0B}
      .c-amber>.th{fill:#633806}.c-amber>.ts{fill:#854F0B}
      .c-coral>rect,.c-coral>circle,.c-coral>ellipse{fill:#FAECE7;stroke:#993C1D}
      .c-coral>.th{fill:#712B13}.c-coral>.ts{fill:#993C1D}
      .c-gray>rect,.c-gray>circle,.c-gray>ellipse{fill:#F1EFE8;stroke:#5F5E5A}
      .c-gray>.th{fill:#444441}.c-gray>.ts{fill:#5F5E5A}
      .c-blue>rect,.c-blue>circle,.c-blue>ellipse{fill:#E6F1FB;stroke:#185FA5}
      .c-blue>.th{fill:#0C447C}.c-blue>.ts{fill:#185FA5}
      @media(prefers-color-scheme:dark){
        :root{--b:rgba(224,225,226,.3);--bg2:#2A2A28;--s:#B0B0AD}
        .c-purple>rect,.c-purple>circle,.c-purple>ellipse{fill:#1E1C3D;stroke:#7A70D0}
        .c-purple>.th{fill:#ADA5F0}.c-purple>.ts{fill:#7A70D0}
        .c-amber>rect,.c-amber>circle,.c-amber>ellipse{fill:#33230A;stroke:#C49020}
        .c-amber>.th{fill:#E0B850}.c-amber>.ts{fill:#C49020}
        .c-coral>rect,.c-coral>circle,.c-coral>ellipse{fill:#331510;stroke:#C05838}
        .c-coral>.th{fill:#E08868}.c-coral>.ts{fill:#C05838}
        .c-gray>rect,.c-gray>circle,.c-gray>ellipse{fill:#252523;stroke:#8E8D88}
        .c-gray>.th{fill:#B0B0AD}.c-gray>.ts{fill:#8E8D88}
        .c-blue>rect,.c-blue>circle,.c-blue>ellipse{fill:#0D2640;stroke:#3A8CD0}
        .c-blue>.th{fill:#7AB8E8}.c-blue>.ts{fill:#3A8CD0}
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 参与者头部 -->
  <g class="c-purple"><rect x="5" y="20" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="50" y="40" text-anchor="middle" dominant-baseline="central">后端</text></g>
  <g class="c-amber"><rect x="115" y="20" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="160" y="40" text-anchor="middle" dominant-baseline="central">TMS</text></g>
  <g class="c-coral"><rect x="237" y="20" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="282" y="40" text-anchor="middle" dominant-baseline="central">task表</text></g>
  <g class="c-amber"><rect x="345" y="20" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="390" y="40" text-anchor="middle" dominant-baseline="central">IMM</text></g>
  <g class="c-gray"><rect x="460" y="20" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="505" y="40" text-anchor="middle" dominant-baseline="central">Cron</text></g>
  <g class="c-blue"><rect x="576" y="20" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="621" y="40" text-anchor="middle" dominant-baseline="central">video表</text></g>

  <!-- 生命线 -->
  <line x1="50"  y1="60" x2="50"  y2="522" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="160" y1="60" x2="160" y2="522" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="282" y1="60" x2="282" y2="522" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="390" y1="60" x2="390" y2="522" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="505" y1="60" x2="505" y2="522" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="621" y1="60" x2="621" y2="522" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="4 3"/>

  <!-- ① Completion 同步 TMS -->
  <rect x="28" y="76" width="630" height="56" rx="4" fill="var(--bg2)" opacity="0.5"/>
  <text class="ts" x="36" y="92" fill="var(--s)">① Completion 完成 → 同步 TMS</text>
  <line x1="50" y1="112" x2="148" y2="112" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="99" y="106" text-anchor="middle">同步招聘数据</text>

  <!-- ② 写入转码任务 -->
  <rect x="28" y="148" width="630" height="76" rx="4" fill="var(--bg2)" opacity="0.5"/>
  <text class="ts" x="36" y="164" fill="var(--s)">② TMS 成功 → 写入转码任务 → 发起 IMM</text>
  <line x1="50" y1="184" x2="270" y2="184" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="160" y="178" text-anchor="middle">写入 teacher_video_convert_task</text>
  <line x1="50" y1="204" x2="378" y2="204" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="214" y="198" text-anchor="middle">发起转码请求</text>

  <!-- ③ IMM 异步转码 -->
  <rect x="28" y="240" width="630" height="52" rx="4" fill="var(--bg2)" opacity="0.5"/>
  <text class="ts" x="36" y="256" fill="var(--s)">③ IMM 异步转码处理中 ...</text>
  <line x1="402" y1="272" x2="450" y2="272" stroke="#BA7517" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="ts" x="426" y="286" text-anchor="middle" dominant-baseline="central">(自旋)</text>

  <!-- ④ 定时拉取 + 回写 task -->
  <rect x="28" y="308" width="630" height="96" rx="4" fill="var(--bg2)" opacity="0.5"/>
  <text class="ts" x="36" y="324" fill="var(--s)">④ 定时任务拉取结果 → 回写 task 表</text>
  <line x1="505" y1="344" x2="402" y2="344" stroke="#888780" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="ts" x="453" y="338" text-anchor="middle">拉取转码结果</text>
  <line x1="390" y1="364" x2="493" y2="364" stroke="#888780" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="ts" x="441" y="358" text-anchor="middle">返回转码状态</text>
  <line x1="505" y1="384" x2="294" y2="384" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="399" y="378" text-anchor="middle">回写 task → status + url</text>

  <!-- ⑤ 回写 video 表 -->
  <rect x="28" y="420" width="630" height="56" rx="4" fill="var(--bg2)" opacity="0.5"/>
  <text class="ts" x="36" y="436" fill="var(--s)">⑤ 回写 tutor_introduce_video</text>
  <line x1="505" y1="456" x2="609" y2="456" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="557" y="450" text-anchor="middle">写入转码 URL + 状态</text>

  <!-- 底部参与者 -->
  <g class="c-purple"><rect x="5" y="530" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="50" y="550" text-anchor="middle" dominant-baseline="central">后端</text></g>
  <g class="c-amber"><rect x="115" y="530" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="160" y="550" text-anchor="middle" dominant-baseline="central">TMS</text></g>
  <g class="c-coral"><rect x="237" y="530" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="282" y="550" text-anchor="middle" dominant-baseline="central">task表</text></g>
  <g class="c-amber"><rect x="345" y="530" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="390" y="550" text-anchor="middle" dominant-baseline="central">IMM</text></g>
  <g class="c-gray"><rect x="460" y="530" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="505" y="550" text-anchor="middle" dominant-baseline="central">Cron</text></g>
  <g class="c-blue"><rect x="576" y="530" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="621" y="550" text-anchor="middle" dominant-baseline="central">video表</text></g>
</svg>
