<svg width="100%" viewBox="0 0 680 720" role="img"
  xmlns="http://www.w3.org/2000/svg">
  <title>创建转码任务 → 定时轮询结果时序图</title>
  <desc>后端监听 launch_status 创建转码任务，定时任务轮询 IMM 结果并回写数据库，成功更新视频URL，失败发钉钉通知</desc>
  <defs>
    <style>
      svg{font-family:"Anthropic Sans",-apple-system,system-ui,"Segoe UI",sans-serif}
      :root{--b:rgba(31,30,29,.3);--bg2:#F5F4ED;--s:#3D3D3A}
      .t{font-size:16px;font-weight:400;fill:var(--s)}
      .ts{font-size:12px;font-weight:400;fill:var(--s)}
      .th{font-size:14px;font-weight:500}
      .c-purple>rect,.c-purple>circle,.c-purple>ellipse{fill:#EEEDFE;stroke:#534AB7}
      .c-purple>.th{fill:#3C3489}.c-purple>.ts{fill:#534AB7}
      .c-blue>rect,.c-blue>circle,.c-blue>ellipse{fill:#E6F1FB;stroke:#185FA5}
      .c-blue>.th{fill:#0C447C}.c-blue>.ts{fill:#185FA5}
      .c-amber>rect,.c-amber>circle,.c-amber>ellipse{fill:#FAEEDA;stroke:#854F0B}
      .c-amber>.th{fill:#633806}.c-amber>.ts{fill:#854F0B}
      @media(prefers-color-scheme:dark){
        :root{--b:rgba(224,225,226,.3);--bg2:#2A2A28;--s:#B0B0AD}
        .c-purple>rect,.c-purple>circle,.c-purple>ellipse{fill:#1E1C3D;stroke:#7A70D0}
        .c-purple>.th{fill:#ADA5F0}.c-purple>.ts{fill:#7A70D0}
        .c-blue>rect,.c-blue>circle,.c-blue>ellipse{fill:#0D2640;stroke:#3A8CD0}
        .c-blue>.th{fill:#7AB8E8}.c-blue>.ts{fill:#3A8CD0}
        .c-amber>rect,.c-amber>circle,.c-amber>ellipse{fill:#33230A;stroke:#C49020}
        .c-amber>.th{fill:#E0B850}.c-amber>.ts{fill:#C49020}
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 参与者头部（4 参与者，centers: 85, 255, 425, 595，盒子宽 90） -->
  <g class="c-purple"><rect x="40" y="20" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="85" y="40" text-anchor="middle" dominant-baseline="central">后端</text></g>
  <g class="c-blue"><rect x="210" y="20" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="255" y="40" text-anchor="middle" dominant-baseline="central">数据库</text></g>
  <g class="c-amber"><rect x="380" y="20" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="425" y="40" text-anchor="middle" dominant-baseline="central">IMM</text></g>
  <g class="c-amber"><rect x="550" y="20" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="595" y="40" text-anchor="middle" dominant-baseline="central">钉钉</text></g>

  <!-- 生命线 -->
  <line x1="85"  y1="60" x2="85"  y2="670" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="255" y1="60" x2="255" y2="670" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="425" y1="60" x2="425" y2="670" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="595" y1="60" x2="595" y2="670" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="4 3"/>

  <!-- ① 创建转码任务 -->
  <rect x="28" y="76" width="630" height="224" rx="4" fill="var(--bg2)" opacity="0.5"/>
  <text class="ts" x="36" y="92" fill="var(--s)">① 创建转码任务（触发：launch_status &gt; 0）</text>

  <line x1="85" y1="120" x2="243" y2="120" stroke="#534AB7" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="ts" x="164" y="112" text-anchor="middle">查询 tutor_introduce_video 表</text>

  <line x1="243" y1="152" x2="97" y2="152" stroke="#888780" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="ts" x="164" y="144" text-anchor="middle">返回视频数据</text>

  <line x1="85" y1="184" x2="243" y2="184" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="164" y="176" text-anchor="middle">写入转码任务表（初始字段）</text>

  <line x1="85" y1="216" x2="413" y2="216" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="249" y="208" text-anchor="middle">调用 IMM 转码接口</text>

  <line x1="413" y1="248" x2="97" y2="248" stroke="#BA7517" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="ts" x="261" y="240" text-anchor="middle">返回 IMM 任务 ID</text>

  <line x1="85" y1="280" x2="243" y2="280" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="164" y="272" text-anchor="middle">更新 transcode_task_id</text>

  <!-- ② 定时轮询查询结果 -->
  <rect x="28" y="320" width="630" height="300" rx="4" fill="var(--bg2)" opacity="0.5"/>
  <text class="ts" x="36" y="336" fill="var(--s)">② 定时轮询 IMM 结果（每 5–10 分钟）</text>

  <line x1="85" y1="364" x2="243" y2="364" stroke="#534AB7" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="ts" x="164" y="356" text-anchor="middle">查询未完成的转码任务</text>

  <line x1="243" y1="396" x2="97" y2="396" stroke="#888780" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="ts" x="164" y="388" text-anchor="middle">返回任务列表</text>

  <line x1="85" y1="428" x2="413" y2="428" stroke="#534AB7" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="ts" x="249" y="420" text-anchor="middle">调用 IMM 查询转码结果</text>

  <line x1="413" y1="460" x2="97" y2="460" stroke="#BA7517" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="ts" x="261" y="452" text-anchor="middle">返回转码状态</text>

  <line x1="85" y1="492" x2="243" y2="492" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="164" y="484" text-anchor="middle">更新任务状态 + 完成时间</text>

  <!-- 分支判断 -->
  <text class="ts" x="292" y="508" fill="var(--s)">▾ 判断转码是否成功</text>

  <line x1="85" y1="544" x2="243" y2="544" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="164" y="536" text-anchor="middle">更新老师表视频 URL</text>

  <line x1="85" y1="576" x2="243" y2="576" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="164" y="568" text-anchor="middle">更新 tutor_introduce_video 表 URL</text>

  <line x1="85" y1="600" x2="583" y2="600" stroke="#BA7517" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="ts" x="340" y="592" text-anchor="middle">发送钉钉通知 [失败]</text>

  <!-- 底部参与者 -->
  <g class="c-purple"><rect x="40" y="640" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="85" y="660" text-anchor="middle" dominant-baseline="central">后端</text></g>
  <g class="c-blue"><rect x="210" y="640" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="255" y="660" text-anchor="middle" dominant-baseline="central">数据库</text></g>
  <g class="c-amber"><rect x="380" y="640" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="425" y="660" text-anchor="middle" dominant-baseline="central">IMM</text></g>
  <g class="c-amber"><rect x="550" y="640" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="595" y="660" text-anchor="middle" dominant-baseline="central">钉钉</text></g>
</svg>
