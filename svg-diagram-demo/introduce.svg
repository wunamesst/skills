<svg width="100%" viewBox="0 0 680 810" role="img"
  xmlns="http://www.w3.org/2000/svg">
  <title>视频数据流转时序图</title>
  <desc>从上传到IMM转码回写的完整时序，包含六个参与者之间的消息交互</desc>
  <defs>
    <style>
      svg{font-family:"Anthropic Sans",-apple-system,system-ui,"Segoe UI",sans-serif}
      :root{--b:rgba(31,30,29,.3);--bg2:#F5F4ED;--s:#3D3D3A}
      .t{font-size:16px;font-weight:400;fill:var(--s)}
      .ts{font-size:12px;font-weight:400;fill:var(--s)}
      .th{font-size:14px;font-weight:500}
      .c-teal>rect,.c-teal>circle,.c-teal>ellipse{fill:#E1F5EE;stroke:#0F6E56}
      .c-teal>.th{fill:#085041}.c-teal>.ts{fill:#0F6E56}
      .c-blue>rect,.c-blue>circle,.c-blue>ellipse{fill:#E6F1FB;stroke:#185FA5}
      .c-blue>.th{fill:#0C447C}.c-blue>.ts{fill:#185FA5}
      .c-amber>rect,.c-amber>circle,.c-amber>ellipse{fill:#FAEEDA;stroke:#854F0B}
      .c-amber>.th{fill:#633806}.c-amber>.ts{fill:#854F0B}
      @media(prefers-color-scheme:dark){
        :root{--b:rgba(224,225,226,.3);--bg2:#2A2A28;--s:#B0B0AD}
        .c-teal>rect,.c-teal>circle,.c-teal>ellipse{fill:#0B2E24;stroke:#2DB88A}
        .c-teal>.th{fill:#5DC9A3}.c-teal>.ts{fill:#2DB88A}
        .c-blue>rect,.c-blue>circle,.c-blue>ellipse{fill:#0D2640;stroke:#3A8CD0}
        .c-blue>.th{fill:#7AB8E8}.c-blue>.ts{fill:#3A8CD0}
        .c-amber>rect,.c-amber>circle,.c-amber>ellipse{fill:#33230A;stroke:#C49020}
        .c-amber>.th{fill:#E0B850}.c-amber>.ts{fill:#C49020}
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 参与者头部 -->
  <g class="c-teal"><rect x="40" y="20" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="85" y="40" text-anchor="middle" dominant-baseline="central">上传者</text></g>
  <g class="c-teal"><rect x="136" y="20" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="181" y="40" text-anchor="middle" dominant-baseline="central">审核员</text></g>
  <g class="c-blue"><rect x="232" y="20" width="104" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="284" y="40" text-anchor="middle" dominant-baseline="central">tutor_video</text></g>
  <g class="c-amber"><rect x="342" y="20" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="387" y="40" text-anchor="middle" dominant-baseline="central">TMS</text></g>
  <g class="c-blue"><rect x="438" y="20" width="106" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="491" y="40" text-anchor="middle" dominant-baseline="central">convert_task</text></g>
  <g class="c-amber"><rect x="550" y="20" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="595" y="40" text-anchor="middle" dominant-baseline="central">IMM 服务</text></g>

  <!-- 生命线 -->
  <line x1="85"  y1="60" x2="85"  y2="760" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="181" y1="60" x2="181" y2="760" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="284" y1="60" x2="284" y2="760" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="387" y1="60" x2="387" y2="760" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="491" y1="60" x2="491" y2="760" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="595" y1="60" x2="595" y2="760" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="4 3"/>

  <!-- ① 上传文件 -->
  <rect x="28" y="76" width="630" height="64" rx="4" fill="var(--bg2)" opacity="0.5"/>
  <text class="ts" x="36" y="92" fill="var(--s)">① 上传文件 → tutor_introduce_video</text>
  <line x1="85" y1="120" x2="272" y2="120" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="184" y="112" text-anchor="middle">上传视频文件</text>

  <!-- ② 审核 -->
  <rect x="28" y="160" width="630" height="128" rx="4" fill="var(--bg2)" opacity="0.5"/>
  <text class="ts" x="36" y="176" fill="var(--s)">② 审核 → tutor_introduce_video_operate_log</text>
  <line x1="181" y1="204" x2="272" y2="204" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="232" y="196" text-anchor="middle">获取视频详情</text>
  <line x1="272" y1="236" x2="193" y2="236" stroke="#888780" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="ts" x="232" y="228" text-anchor="middle">返回视频数据</text>
  <line x1="181" y1="268" x2="272" y2="268" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="232" y="260" text-anchor="middle">提交审核结果</text>

  <!-- ③ Completion 同步 -->
  <rect x="28" y="308" width="630" height="96" rx="4" fill="var(--bg2)" opacity="0.5"/>
  <text class="ts" x="36" y="324" fill="var(--s)">③ Completion 完成 → 同步 TMS</text>
  <line x1="85" y1="352" x2="272" y2="352" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="184" y="344" text-anchor="middle">读取视频数据</text>
  <line x1="85" y1="384" x2="375" y2="384" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="236" y="376" text-anchor="middle">同步数据到 TMS</text>

  <!-- ④ 发起 IMM 转码 -->
  <rect x="28" y="424" width="630" height="96" rx="4" fill="var(--bg2)" opacity="0.5"/>
  <text class="ts" x="36" y="440" fill="var(--s)">④ TMS 同步成功 → 发起 IMM 转码</text>
  <line x1="387" y1="468" x2="479" y2="468" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="439" y="460" text-anchor="middle">写入转码任务</text>
  <line x1="387" y1="500" x2="583" y2="500" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="491" y="492" text-anchor="middle">发起转码请求</text>

  <!-- ⑤ 定时任务轮询回写 -->
  <rect x="28" y="540" width="630" height="160" rx="4" fill="var(--bg2)" opacity="0.5"/>
  <text class="ts" x="36" y="556" fill="var(--s)">⑤ 定时任务拉取 IMM 结果 → 回写</text>
  <line x1="85" y1="584" x2="583" y2="584" stroke="#888780" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="ts" x="340" y="576" text-anchor="middle">拉取转码结果</text>
  <line x1="583" y1="616" x2="97" y2="616" stroke="#888780" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="ts" x="340" y="608" text-anchor="middle">返回转码结果</text>
  <line x1="85" y1="648" x2="479" y2="648" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="288" y="640" text-anchor="middle">回写 convert_task 状态</text>
  <line x1="85" y1="680" x2="272" y2="680" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="184" y="672" text-anchor="middle">回写 tutor_video 转码 URL + 状态</text>

  <!-- 底部参与者 -->
  <g class="c-teal"><rect x="40" y="728" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="85" y="748" text-anchor="middle" dominant-baseline="central">上传者</text></g>
  <g class="c-teal"><rect x="136" y="728" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="181" y="748" text-anchor="middle" dominant-baseline="central">审核员</text></g>
  <g class="c-blue"><rect x="232" y="728" width="104" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="284" y="748" text-anchor="middle" dominant-baseline="central">tutor_video</text></g>
  <g class="c-amber"><rect x="342" y="728" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="387" y="748" text-anchor="middle" dominant-baseline="central">TMS</text></g>
  <g class="c-blue"><rect x="438" y="728" width="106" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="491" y="748" text-anchor="middle" dominant-baseline="central">convert_task</text></g>
  <g class="c-amber"><rect x="550" y="728" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="595" y="748" text-anchor="middle" dominant-baseline="central">IMM 服务</text></g>
</svg>
