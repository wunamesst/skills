<svg width="100%" viewBox="0 0 680 576" role="img"
  xmlns="http://www.w3.org/2000/svg">
  <title>文件上传审核转码时序图（总览）</title>
  <desc>Candidate/Trainer上传文件，审核员审核，Completion同步TMS，发起IMM转码，定时任务回写结果</desc>
  <defs>
    <style>
      svg{font-family:"Anthropic Sans",-apple-system,system-ui,"Segoe UI",sans-serif}
      :root{--b:rgba(31,30,29,.3);--bg2:#F5F4ED;--s:#3D3D3A}
      .t{font-size:16px;font-weight:400;fill:var(--s)}
      .ts{font-size:12px;font-weight:400;fill:var(--s)}
      .th{font-size:14px;font-weight:500}
      .c-teal>rect,.c-teal>circle,.c-teal>ellipse{fill:#E1F5EE;stroke:#0F6E56}
      .c-teal>.th{fill:#085041}.c-teal>.ts{fill:#0F6E56}
      .c-purple>rect,.c-purple>circle,.c-purple>ellipse{fill:#EEEDFE;stroke:#534AB7}
      .c-purple>.th{fill:#3C3489}.c-purple>.ts{fill:#534AB7}
      .c-blue>rect,.c-blue>circle,.c-blue>ellipse{fill:#E6F1FB;stroke:#185FA5}
      .c-blue>.th{fill:#0C447C}.c-blue>.ts{fill:#185FA5}
      .c-amber>rect,.c-amber>circle,.c-amber>ellipse{fill:#FAEEDA;stroke:#854F0B}
      .c-amber>.th{fill:#633806}.c-amber>.ts{fill:#854F0B}
      .c-coral>rect,.c-coral>circle,.c-coral>ellipse{fill:#FAECE7;stroke:#993C1D}
      .c-coral>.th{fill:#712B13}.c-coral>.ts{fill:#993C1D}
      @media(prefers-color-scheme:dark){
        :root{--b:rgba(224,225,226,.3);--bg2:#2A2A28;--s:#B0B0AD}
        .c-teal>rect,.c-teal>circle,.c-teal>ellipse{fill:#0B2E24;stroke:#2DB88A}
        .c-teal>.th{fill:#5DC9A3}.c-teal>.ts{fill:#2DB88A}
        .c-purple>rect,.c-purple>circle,.c-purple>ellipse{fill:#1E1C3D;stroke:#7A70D0}
        .c-purple>.th{fill:#ADA5F0}.c-purple>.ts{fill:#7A70D0}
        .c-blue>rect,.c-blue>circle,.c-blue>ellipse{fill:#0D2640;stroke:#3A8CD0}
        .c-blue>.th{fill:#7AB8E8}.c-blue>.ts{fill:#3A8CD0}
        .c-amber>rect,.c-amber>circle,.c-amber>ellipse{fill:#33230A;stroke:#C49020}
        .c-amber>.th{fill:#E0B850}.c-amber>.ts{fill:#C49020}
        .c-coral>rect,.c-coral>circle,.c-coral>ellipse{fill:#331510;stroke:#C05838}
        .c-coral>.th{fill:#E08868}.c-coral>.ts{fill:#C05838}
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 参与者头部 -->
  <g class="c-teal"><rect x="5" y="20" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="50" y="40" text-anchor="middle" dominant-baseline="central">上传者</text></g>
  <g class="c-teal"><rect x="115" y="20" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="160" y="40" text-anchor="middle" dominant-baseline="central">审核员</text></g>
  <g class="c-purple"><rect x="237" y="20" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="282" y="40" text-anchor="middle" dominant-baseline="central">后端</text></g>
  <g class="c-blue"><rect x="340" y="20" width="100" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="390" y="40" text-anchor="middle" dominant-baseline="central">数据存储</text></g>
  <g class="c-amber"><rect x="460" y="20" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="505" y="40" text-anchor="middle" dominant-baseline="central">TMS</text></g>
  <g class="c-coral"><rect x="576" y="20" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="621" y="40" text-anchor="middle" dominant-baseline="central">IMM</text></g>

  <!-- 生命线 -->
  <line x1="50"  y1="60" x2="50"  y2="526" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="160" y1="60" x2="160" y2="526" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="282" y1="60" x2="282" y2="526" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="390" y1="60" x2="390" y2="526" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="505" y1="60" x2="505" y2="526" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="621" y1="60" x2="621" y2="526" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="4 3"/>

  <!-- ① 上传文件 -->
  <rect x="28" y="76" width="630" height="56" rx="4" fill="var(--bg2)" opacity="0.5"/>
  <text class="ts" x="36" y="92" fill="var(--s)">① 上传文件 → tutor_introduce_video</text>
  <line x1="50" y1="112" x2="270" y2="112" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="160" y="106" text-anchor="middle">上传视频文件</text>

  <!-- ② 审核 -->
  <rect x="28" y="148" width="630" height="96" rx="4" fill="var(--bg2)" opacity="0.5"/>
  <text class="ts" x="36" y="164" fill="var(--s)">② 审核 → tutor_introduce_video_operate_log</text>
  <line x1="160" y1="184" x2="270" y2="184" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="215" y="178" text-anchor="middle">获取视频详情</text>
  <line x1="270" y1="204" x2="172" y2="204" stroke="#888780" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="ts" x="215" y="198" text-anchor="middle">返回视频数据</text>
  <line x1="160" y1="224" x2="270" y2="224" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="215" y="218" text-anchor="middle">提交审核结果</text>

  <!-- ③ Completion 同步 TMS -->
  <rect x="28" y="260" width="630" height="56" rx="4" fill="var(--bg2)" opacity="0.5"/>
  <text class="ts" x="36" y="276" fill="var(--s)">③ Completion 完成 → 同步 TMS</text>
  <line x1="282" y1="296" x2="493" y2="296" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="387" y="290" text-anchor="middle">同步招聘数据到 TMS</text>

  <!-- ④ 发起 IMM 转码 -->
  <rect x="28" y="332" width="630" height="56" rx="4" fill="var(--bg2)" opacity="0.5"/>
  <text class="ts" x="36" y="348" fill="var(--s)">④ 发起 IMM 转码 → teacher_video_convert_task</text>
  <line x1="282" y1="368" x2="609" y2="368" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="445" y="362" text-anchor="middle">写入转码任务 → 发起转码请求</text>

  <!-- ⑤ 定时回写 -->
  <rect x="28" y="404" width="630" height="76" rx="4" fill="var(--bg2)" opacity="0.5"/>
  <text class="ts" x="36" y="420" fill="var(--s)">⑤ 定时任务拉取 IMM 结果 → 回写</text>
  <line x1="282" y1="440" x2="609" y2="440" stroke="#888780" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="ts" x="445" y="434" text-anchor="middle">拉取转码结果</text>
  <line x1="282" y1="460" x2="378" y2="460" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="330" y="454" text-anchor="middle">回写 video + task 状态</text>

  <!-- 底部参与者 -->
  <g class="c-teal"><rect x="5" y="534" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="50" y="554" text-anchor="middle" dominant-baseline="central">上传者</text></g>
  <g class="c-teal"><rect x="115" y="534" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="160" y="554" text-anchor="middle" dominant-baseline="central">审核员</text></g>
  <g class="c-purple"><rect x="237" y="534" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="282" y="554" text-anchor="middle" dominant-baseline="central">后端</text></g>
  <g class="c-blue"><rect x="340" y="534" width="100" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="390" y="554" text-anchor="middle" dominant-baseline="central">数据存储</text></g>
  <g class="c-amber"><rect x="460" y="534" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="505" y="554" text-anchor="middle" dominant-baseline="central">TMS</text></g>
  <g class="c-coral"><rect x="576" y="534" width="90" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="621" y="554" text-anchor="middle" dominant-baseline="central">IMM</text></g>
</svg>
