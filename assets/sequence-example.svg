<svg width="100%" viewBox="0 0 680 592" role="img"
  xmlns="http://www.w3.org/2000/svg">
  <title>OAuth 2.0 Authorization Code Flow</title>
  <desc>OAuth 2.0 authorization code grant: user authorization, token exchange, and resource access</desc>
  <defs>
    <style>
      svg{font-family:"JetBrains Mono","Anthropic Sans",-apple-system,system-ui,"Segoe UI",sans-serif}
      :root{--b:rgba(31,30,29,.3);--bg2:#F5F4ED;--s:#3D3D3A}
      .t{font-size:16px;font-weight:400;fill:var(--s)}
      .ts{font-size:12px;font-weight:400;fill:var(--s)}
      .th{font-size:14px;font-weight:500}
      .c-teal>rect,.c-teal>polygon,.c-teal>circle,.c-teal>ellipse{fill:#E1F5EE;stroke:#0F6E56}
      .c-teal>.th{fill:#085041}.c-teal>.ts{fill:#0F6E56}
      .c-purple>rect,.c-purple>polygon,.c-purple>circle,.c-purple>ellipse{fill:#EEEDFE;stroke:#534AB7}
      .c-purple>.th{fill:#3C3489}.c-purple>.ts{fill:#534AB7}
      .c-amber>rect,.c-amber>polygon,.c-amber>circle,.c-amber>ellipse{fill:#FAEEDA;stroke:#854F0B}
      .c-amber>.th{fill:#633806}.c-amber>.ts{fill:#854F0B}
      .c-blue>rect,.c-blue>polygon,.c-blue>circle,.c-blue>ellipse{fill:#E6F1FB;stroke:#185FA5}
      .c-blue>.th{fill:#0C447C}.c-blue>.ts{fill:#185FA5}
      @media(prefers-color-scheme:dark){
        :root{--b:rgba(224,225,226,.3);--bg2:#2A2A28;--s:#B0B0AD}
        .c-teal>rect,.c-teal>polygon,.c-teal>circle,.c-teal>ellipse{fill:#0B2E24;stroke:#2DB88A}
        .c-teal>.th{fill:#5DC9A3}.c-teal>.ts{fill:#2DB88A}
        .c-purple>rect,.c-purple>polygon,.c-purple>circle,.c-purple>ellipse{fill:#1E1C3D;stroke:#7A70D0}
        .c-purple>.th{fill:#ADA5F0}.c-purple>.ts{fill:#7A70D0}
        .c-amber>rect,.c-amber>polygon,.c-amber>circle,.c-amber>ellipse{fill:#33230A;stroke:#C49020}
        .c-amber>.th{fill:#E0B850}.c-amber>.ts{fill:#C49020}
        .c-blue>rect,.c-blue>polygon,.c-blue>circle,.c-blue>ellipse{fill:#0D2640;stroke:#3A8CD0}
        .c-blue>.th{fill:#7AB8E8}.c-blue>.ts{fill:#3A8CD0}
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Top participants -->
  <g class="c-teal"><rect x="70" y="20" width="120" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="130" y="40" text-anchor="middle" dominant-baseline="central">用户</text></g>
  <g class="c-purple"><rect x="210" y="20" width="120" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="270" y="40" text-anchor="middle" dominant-baseline="central">客户端</text></g>
  <g class="c-amber"><rect x="350" y="20" width="120" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="410" y="40" text-anchor="middle" dominant-baseline="central">授权服务</text></g>
  <g class="c-blue"><rect x="490" y="20" width="120" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="550" y="40" text-anchor="middle" dominant-baseline="central">资源服务</text></g>

  <!-- Lifelines -->
  <line x1="130" y1="60" x2="130" y2="532" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="270" y1="60" x2="270" y2="532" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="410" y1="60" x2="410" y2="532" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="550" y1="60" x2="550" y2="532" stroke="var(--b)" stroke-width="0.5" stroke-dasharray="4 3"/>

  <!-- ① 授权请求 -->
  <rect x="28" y="76" width="630" height="144" rx="4" fill="var(--bg2)" opacity="0.5"/>
  <text class="ts" x="36" y="92" fill="var(--s)">① 授权请求（浏览器重定向）</text>

  <line x1="270" y1="120" x2="410" y2="120"
    stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="340" y="112" text-anchor="middle">GET /authorize</text>

  <line x1="130" y1="152" x2="410" y2="152"
    stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="270" y="144" text-anchor="middle">登录并授权</text>

  <line x1="410" y1="184" x2="270" y2="184"
    stroke="#888780" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="ts" x="340" y="176" text-anchor="middle">authorization_code</text>

  <!-- ② 令牌交换 -->
  <rect x="28" y="240" width="630" height="112" rx="4" fill="var(--bg2)" opacity="0.5"/>
  <text class="ts" x="36" y="256" fill="var(--s)">② 令牌交换（服务端直连）</text>

  <line x1="270" y1="284" x2="410" y2="284"
    stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="340" y="276" text-anchor="middle">POST /token (code + secret)</text>

  <line x1="410" y1="316" x2="270" y2="316"
    stroke="#888780" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="ts" x="340" y="308" text-anchor="middle">access_token</text>

  <!-- ③ 访问资源 -->
  <rect x="28" y="372" width="630" height="112" rx="4" fill="var(--bg2)" opacity="0.5"/>
  <text class="ts" x="36" y="388" fill="var(--s)">③ 访问资源</text>

  <line x1="270" y1="416" x2="550" y2="416"
    stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="410" y="408" text-anchor="middle">Bearer access_token</text>

  <line x1="550" y1="448" x2="270" y2="448"
    stroke="#888780" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="ts" x="410" y="440" text-anchor="middle">protected data</text>

  <!-- Bottom participants -->
  <g class="c-teal"><rect x="70" y="512" width="120" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="130" y="532" text-anchor="middle" dominant-baseline="central">用户</text></g>
  <g class="c-purple"><rect x="210" y="512" width="120" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="270" y="532" text-anchor="middle" dominant-baseline="central">客户端</text></g>
  <g class="c-amber"><rect x="350" y="512" width="120" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="410" y="532" text-anchor="middle" dominant-baseline="central">授权服务</text></g>
  <g class="c-blue"><rect x="490" y="512" width="120" height="40" rx="6" stroke-width="0.5"/>
    <text class="th" x="550" y="532" text-anchor="middle" dominant-baseline="central">资源服务</text></g>
</svg>
