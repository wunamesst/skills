<svg width="100%" viewBox="0 0 680 670" role="img"
  xmlns="http://www.w3.org/2000/svg">
  <title>DDD 分层架构图</title>
  <desc>领域驱动设计四层架构：用户接口层、应用层、领域层（核心）、基础设施层，各层核心组件及依赖关系</desc>
  <defs>
    <style>
      svg{font-family:"Anthropic Sans",-apple-system,system-ui,"Segoe UI",sans-serif}
      :root{--b:rgba(31,30,29,.3);--bg2:#F5F4ED;--s:#3D3D3A}
      .t{font-size:16px;font-weight:400;fill:var(--s)}
      .ts{font-size:12px;font-weight:400;fill:var(--s)}
      .th{font-size:14px;font-weight:500}
      .c-teal>rect,.c-teal>circle,.c-teal>ellipse{fill:#E1F5EE;stroke:#0F6E56}
      .c-teal>.th{fill:#085041}.c-teal>.ts{fill:#0F6E56}
      .c-purple>rect,.c-purple>circle,.c-purple>ellipse{fill:#EEEDFE;stroke:#534AB7}
      .c-purple>.th{fill:#3C3489}.c-purple>.ts{fill:#534AB7}
      .c-blue>rect,.c-blue>circle,.c-blue>ellipse{fill:#E6F1FB;stroke:#185FA5}
      .c-blue>.th{fill:#0C447C}.c-blue>.ts{fill:#185FA5}
      @media(prefers-color-scheme:dark){
        :root{--b:rgba(224,225,226,.3);--bg2:#2A2A28;--s:#B0B0AD}
        .c-teal>rect,.c-teal>circle,.c-teal>ellipse{fill:#0B2E24;stroke:#2DB88A}
        .c-teal>.th{fill:#5DC9A3}.c-teal>.ts{fill:#2DB88A}
        .c-purple>rect,.c-purple>circle,.c-purple>ellipse{fill:#1E1C3D;stroke:#7A70D0}
        .c-purple>.th{fill:#ADA5F0}.c-purple>.ts{fill:#7A70D0}
        .c-blue>rect,.c-blue>circle,.c-blue>ellipse{fill:#0D2640;stroke:#3A8CD0}
        .c-blue>.th{fill:#7AB8E8}.c-blue>.ts{fill:#3A8CD0}
      }
    </style>
    <marker id="arrow-thin" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
        stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="680" height="670" fill="#FAFAF8"/>

  <!-- 标题 -->
  <text class="t" x="340" y="30" text-anchor="middle" dominant-baseline="central" font-weight="600">DDD 分层架构</text>

  <!-- ===== Layer 1: 用户接口层 (c-teal) ===== -->
  <rect x="60" y="48" width="560" height="115" rx="12" fill="var(--bg2)" stroke="#E0DFDA" stroke-width="0.5"/>
  <g class="c-teal">
    <rect x="76" y="62" width="130" height="24" rx="5"/>
    <text class="th" x="141" y="74" text-anchor="middle" dominant-baseline="central">用户接口层</text>
    <rect x="93" y="101" width="150" height="34" rx="5"/>
    <text class="ts" x="168" y="118" text-anchor="middle" dominant-baseline="central">Controller</text>
    <rect x="265" y="101" width="150" height="34" rx="5"/>
    <text class="ts" x="340" y="118" text-anchor="middle" dominant-baseline="central">DTO / VO</text>
    <rect x="437" y="101" width="150" height="34" rx="5"/>
    <text class="ts" x="512" y="118" text-anchor="middle" dominant-baseline="central">校验 &amp; 序列化</text>
  </g>

  <!-- L1 → L2 依赖箭头 -->
  <line x1="340" y1="167" x2="340" y2="179" stroke="#888780" stroke-width="1" marker-end="url(#arrow-thin)"/>

  <!-- ===== Layer 2: 应用层 (c-purple) ===== -->
  <rect x="60" y="183" width="560" height="115" rx="12" fill="var(--bg2)" stroke="#E0DFDA" stroke-width="0.5"/>
  <g class="c-purple">
    <rect x="76" y="197" width="100" height="24" rx="5"/>
    <text class="th" x="126" y="209" text-anchor="middle" dominant-baseline="central">应用层</text>
    <rect x="93" y="236" width="150" height="34" rx="5"/>
    <text class="ts" x="168" y="253" text-anchor="middle" dominant-baseline="central">AppService</text>
    <rect x="265" y="236" width="150" height="34" rx="5"/>
    <text class="ts" x="340" y="253" text-anchor="middle" dominant-baseline="central">Command / Query</text>
    <rect x="437" y="236" width="150" height="34" rx="5"/>
    <text class="ts" x="512" y="253" text-anchor="middle" dominant-baseline="central">事务 &amp; 权限</text>
  </g>

  <!-- L2 → L3 依赖箭头 -->
  <line x1="340" y1="302" x2="340" y2="314" stroke="#888780" stroke-width="1" marker-end="url(#arrow-thin)"/>

  <!-- ===== Layer 3: 领域层 (c-purple) ===== -->
  <rect x="60" y="318" width="560" height="165" rx="12" fill="var(--bg2)" stroke="#E0DFDA" stroke-width="0.5"/>
  <g class="c-purple">
    <rect x="76" y="332" width="130" height="24" rx="5"/>
    <text class="th" x="141" y="344" text-anchor="middle" dominant-baseline="central">领域层 · 核心</text>
    <!-- Row 1 -->
    <rect x="93" y="374" width="150" height="34" rx="5"/>
    <text class="ts" x="168" y="391" text-anchor="middle" dominant-baseline="central">Entity</text>
    <rect x="265" y="374" width="150" height="34" rx="5"/>
    <text class="ts" x="340" y="391" text-anchor="middle" dominant-baseline="central">Value Object</text>
    <rect x="437" y="374" width="150" height="34" rx="5"/>
    <text class="ts" x="512" y="391" text-anchor="middle" dominant-baseline="central">Aggregate</text>
    <!-- Row 2 -->
    <rect x="93" y="426" width="150" height="34" rx="5"/>
    <text class="ts" x="168" y="443" text-anchor="middle" dominant-baseline="central">Domain Service</text>
    <rect x="265" y="426" width="150" height="34" rx="5"/>
    <text class="ts" x="340" y="443" text-anchor="middle" dominant-baseline="central">Repository 接口</text>
    <rect x="437" y="426" width="150" height="34" rx="5"/>
    <text class="ts" x="512" y="443" text-anchor="middle" dominant-baseline="central">领域事件</text>
  </g>

  <!-- L3 → L4 依赖箭头 -->
  <line x1="340" y1="487" x2="340" y2="499" stroke="#888780" stroke-width="1" marker-end="url(#arrow-thin)"/>

  <!-- ===== Layer 4: 基础设施层 (c-blue) ===== -->
  <rect x="60" y="503" width="560" height="115" rx="12" fill="var(--bg2)" stroke="#E0DFDA" stroke-width="0.5"/>
  <g class="c-blue">
    <rect x="76" y="517" width="130" height="24" rx="5"/>
    <text class="th" x="141" y="529" text-anchor="middle" dominant-baseline="central">基础设施层</text>
    <rect x="93" y="556" width="150" height="34" rx="5"/>
    <text class="ts" x="168" y="573" text-anchor="middle" dominant-baseline="central">Repository Impl</text>
    <rect x="265" y="556" width="150" height="34" rx="5"/>
    <text class="ts" x="340" y="573" text-anchor="middle" dominant-baseline="central">ORM / 缓存</text>
    <rect x="437" y="556" width="150" height="34" rx="5"/>
    <text class="ts" x="512" y="573" text-anchor="middle" dominant-baseline="central">消息 / 外部 API</text>
  </g>

  <!-- 右侧依赖方向标注 -->
  <text class="ts" x="628" y="300" text-anchor="end" fill="var(--s)" transform="rotate(-90 628 300)">依赖方向</text>
  <line x1="626" y1="170" x2="626" y2="490" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3"/>

  <!-- 底部说明 -->
  <text class="ts" x="340" y="645" text-anchor="middle" fill="var(--s)">外层依赖内层 ｜ Interfaces → Application → Domain ｜ Infrastructure 实现 Domain 定义的接口</text>
</svg>