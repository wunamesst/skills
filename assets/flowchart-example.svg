<svg width="100%" viewBox="0 0 680 512" role="img"
  xmlns="http://www.w3.org/2000/svg">
  <title>任务微服务架构图</title>
  <desc>Laravel + Redis + MySQL + RabbitMQ 任务微服务系统架构</desc>
  <defs>
    <style>
      svg{font-family:"JetBrains Mono","Anthropic Sans",-apple-system,system-ui,"Segoe UI",sans-serif}
      :root{--b:rgba(31,30,29,.3);--bg2:#F5F4ED;--s:#3D3D3A}
      .t{font-size:16px;font-weight:400;fill:var(--s)}
      .ts{font-size:12px;font-weight:400;fill:var(--s)}
      .th{font-size:14px;font-weight:500}
      .c-gray>rect{fill:#F1EFE8;stroke:#5F5E5A}
      .c-gray>.th{fill:#444441}.c-gray>.ts{fill:#5F5E5A}
      .c-teal>rect{fill:#E1F5EE;stroke:#0F6E56}
      .c-teal>.th{fill:#085041}.c-teal>.ts{fill:#0F6E56}
      .c-purple>rect{fill:#EEEDFE;stroke:#534AB7}
      .c-purple>.th{fill:#3C3489}.c-purple>.ts{fill:#534AB7}
      .c-amber>rect{fill:#FAEEDA;stroke:#854F0B}
      .c-amber>.th{fill:#633806}.c-amber>.ts{fill:#854F0B}
      .c-coral>rect{fill:#FAECE7;stroke:#993C1D}
      .c-coral>.th{fill:#712B13}.c-coral>.ts{fill:#993C1D}
      .c-blue>rect{fill:#E6F1FB;stroke:#185FA5}
      .c-blue>.th{fill:#0C447C}.c-blue>.ts{fill:#185FA5}
      .c-green>rect{fill:#EAF3DE;stroke:#3B6D11}
      .c-green>.th{fill:#27500A}.c-green>.ts{fill:#3B6D11}
      @media(prefers-color-scheme:dark){
        :root{--b:rgba(224,225,226,.3);--bg2:#2A2A28;--s:#B0B0AD}
        .c-gray>rect{fill:#252523;stroke:#8E8D88}
        .c-gray>.th{fill:#B0B0AD}.c-gray>.ts{fill:#8E8D88}
        .c-teal>rect{fill:#0B2E24;stroke:#2DB88A}
        .c-teal>.th{fill:#5DC9A3}.c-teal>.ts{fill:#2DB88A}
        .c-purple>rect{fill:#1E1C3D;stroke:#7A70D0}
        .c-purple>.th{fill:#ADA5F0}.c-purple>.ts{fill:#7A70D0}
        .c-amber>rect{fill:#33230A;stroke:#C49020}
        .c-amber>.th{fill:#E0B850}.c-amber>.ts{fill:#C49020}
        .c-coral>rect{fill:#331510;stroke:#C05838}
        .c-coral>.th{fill:#E08868}.c-coral>.ts{fill:#C05838}
        .c-blue>rect{fill:#0D2640;stroke:#3A8CD0}
        .c-blue>.th{fill:#7AB8E8}.c-blue>.ts{fill:#3A8CD0}
        .c-green>rect{fill:#152D08;stroke:#5A9E20}
        .c-green>.th{fill:#80C040}.c-green>.ts{fill:#5A9E20}
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Main container -->
  <g class="c-gray">
    <rect x="40" y="20" width="600" height="340" rx="20" stroke-width="0.5"/>
    <text class="th" x="340" y="50" text-anchor="middle" dominant-baseline="central">任务微服务 Task Service (Laravel)</text>
  </g>

  <!-- Task API -->
  <g class="c-teal">
    <rect x="240" y="72" width="200" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="89" text-anchor="middle" dominant-baseline="central">Task API</text>
    <text class="ts" x="340" y="110" text-anchor="middle" dominant-baseline="central">接口层</text>
  </g>

  <!-- Task Engine -->
  <g class="c-purple">
    <rect x="240" y="152" width="200" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="169" text-anchor="middle" dominant-baseline="central">Task Engine</text>
    <text class="ts" x="340" y="190" text-anchor="middle" dominant-baseline="central">业务逻辑</text>
  </g>

  <!-- Arrow: API → Engine -->
  <line x1="340" y1="124" x2="340" y2="150" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Scheduler -->
  <g class="c-amber">
    <rect x="80" y="240" width="150" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="155" y="257" text-anchor="middle" dominant-baseline="central">Scheduler</text>
    <text class="ts" x="155" y="278" text-anchor="middle" dominant-baseline="central">定时调度</text>
  </g>

  <!-- Dispatcher -->
  <g class="c-coral">
    <rect x="265" y="240" width="150" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="257" text-anchor="middle" dominant-baseline="central">Dispatcher</text>
    <text class="ts" x="340" y="278" text-anchor="middle" dominant-baseline="central">任务分发</text>
  </g>

  <!-- Worker Pool -->
  <g class="c-green">
    <rect x="450" y="240" width="150" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="525" y="257" text-anchor="middle" dominant-baseline="central">Worker Pool</text>
    <text class="ts" x="525" y="278" text-anchor="middle" dominant-baseline="central">任务执行器</text>
  </g>

  <!-- Arrows: Engine → Scheduler / Dispatcher / Worker -->
  <line x1="300" y1="204" x2="155" y2="238" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="204" x2="340" y2="238" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="380" y1="204" x2="525" y2="238" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Redis -->
  <g class="c-blue">
    <rect x="60" y="420" width="160" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="140" y="437" text-anchor="middle" dominant-baseline="central">Redis</text>
    <text class="ts" x="140" y="458" text-anchor="middle" dominant-baseline="central">缓存 / 分布式锁</text>
  </g>

  <!-- MySQL -->
  <g class="c-blue">
    <rect x="260" y="420" width="160" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="437" text-anchor="middle" dominant-baseline="central">MySQL</text>
    <text class="ts" x="340" y="458" text-anchor="middle" dominant-baseline="central">持久化存储</text>
  </g>

  <!-- RabbitMQ -->
  <g class="c-coral">
    <rect x="460" y="420" width="160" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="540" y="437" text-anchor="middle" dominant-baseline="central">RabbitMQ</text>
    <text class="ts" x="540" y="458" text-anchor="middle" dominant-baseline="central">异步消息队列</text>
  </g>

  <!-- Connection lines: Service → External -->
  <line x1="140" y1="360" x2="140" y2="418" stroke="#888780" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <line x1="340" y1="360" x2="340" y2="418" stroke="#888780" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <line x1="540" y1="360" x2="540" y2="418" stroke="#888780" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>

  <!-- Connection labels -->
  <text class="ts" x="140" y="390" text-anchor="middle">Engine, Worker</text>
  <text class="ts" x="340" y="390" text-anchor="middle">Engine, Worker</text>
  <text class="ts" x="540" y="390" text-anchor="middle">Dispatcher, Worker</text>
</svg>
