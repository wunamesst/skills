<svg width="100%" viewBox="0 0 680 1030" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>JWT 认证流程图</title>
  <desc>JWT 认证完整流程：登录获取 Token、携带 Token 访问资源，包含凭据校验、签名验证、过期检查三个决策分支和错误处理路径</desc>
  <defs>
    <style>
      svg{font-family:"Anthropic Sans",-apple-system,system-ui,"Segoe UI",sans-serif}
      :root{--b:rgba(31,30,29,.3);--bg2:#F5F4ED;--s:#3D3D3A}
      .t{font-size:16px;font-weight:400;fill:var(--s)}
      .ts{font-size:12px;font-weight:400;fill:var(--s)}
      .th{font-size:14px;font-weight:500}
      .c-teal>rect,.c-teal>polygon,.c-teal>circle{fill:#E1F5EE;stroke:#0F6E56}
      .c-teal>.th{fill:#085041}.c-teal>.ts{fill:#0F6E56}
      .c-purple>rect,.c-purple>polygon,.c-purple>circle{fill:#EEEDFE;stroke:#534AB7}
      .c-purple>.th{fill:#3C3489}.c-purple>.ts{fill:#534AB7}
      .c-amber>rect,.c-amber>polygon,.c-amber>circle{fill:#FAEEDA;stroke:#854F0B}
      .c-amber>.th{fill:#633806}.c-amber>.ts{fill:#854F0B}
      .c-green>rect,.c-green>polygon,.c-green>circle{fill:#EAF3DE;stroke:#3B6D11}
      .c-green>.th{fill:#27500A}.c-green>.ts{fill:#3B6D11}
      .c-red>rect,.c-red>polygon,.c-red>circle{fill:#FCEBEB;stroke:#A32D2D}
      .c-red>.th{fill:#791F1F}.c-red>.ts{fill:#A32D2D}
      @media(prefers-color-scheme:dark){
        :root{--b:rgba(224,225,226,.3);--bg2:#2A2A28;--s:#B0B0AD}
        .c-teal>rect,.c-teal>polygon,.c-teal>circle{fill:#0B2E24;stroke:#2DB88A}
        .c-teal>.th{fill:#5DC9A3}.c-teal>.ts{fill:#2DB88A}
        .c-purple>rect,.c-purple>polygon,.c-purple>circle{fill:#1E1C3D;stroke:#7A70D0}
        .c-purple>.th{fill:#ADA5F0}.c-purple>.ts{fill:#7A70D0}
        .c-amber>rect,.c-amber>polygon,.c-amber>circle{fill:#33230A;stroke:#C49020}
        .c-amber>.th{fill:#E0B850}.c-amber>.ts{fill:#C49020}
        .c-green>rect,.c-green>polygon,.c-green>circle{fill:#152D08;stroke:#5A9E20}
        .c-green>.th{fill:#80C040}.c-green>.ts{fill:#5A9E20}
        .c-red>rect,.c-red>polygon,.c-red>circle{fill:#331212;stroke:#C04040}
        .c-red>.th{fill:#E07070}.c-red>.ts{fill:#C04040}
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ===== Main flow (center) ===== -->

  <!-- Start -->
  <circle cx="280" cy="40" r="16" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1.5"/>
  <line x1="280" y1="56" x2="280" y2="74" stroke="#3B6D11" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 1: 发送登录请求 -->
  <g class="c-teal">
    <rect x="180" y="76" width="200" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="280" y="98" text-anchor="middle" dominant-baseline="central">用户发送登录请求</text>
    <text class="ts" x="280" y="116" text-anchor="middle" dominant-baseline="central">POST /login {username, password}</text>
  </g>
  <line x1="280" y1="132" x2="280" y2="156" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: 验证凭据 -->
  <g class="c-purple">
    <rect x="180" y="158" width="200" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="280" y="180" text-anchor="middle" dominant-baseline="central">服务器验证凭据</text>
    <text class="ts" x="280" y="198" text-anchor="middle" dominant-baseline="central">查询数据库校验用户名密码</text>
  </g>
  <line x1="280" y1="214" x2="280" y2="238" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Diamond 1: 凭据有效? (width=140, height=70) -->
  <g class="c-amber">
    <polygon points="280,240 350,275 280,310 210,275" stroke-width="0.5"/>
    <text class="th" x="280" y="275" text-anchor="middle" dominant-baseline="central">凭据有效?</text>
  </g>
  <text class="ts" x="294" y="318" fill="#3B6D11">是</text>
  <line x1="280" y1="310" x2="280" y2="338" stroke="#3B6D11" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="358" y="268" fill="#A32D2D">否</text>
  <line x1="350" y1="275" x2="440" y2="275" stroke="#A32D2D" stroke-width="1" stroke-dasharray="5 3"/>

  <!-- Step 3: 生成 JWT -->
  <g class="c-purple">
    <rect x="180" y="340" width="200" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="280" y="362" text-anchor="middle" dominant-baseline="central">生成 JWT</text>
    <text class="ts" x="280" y="380" text-anchor="middle" dominant-baseline="central">Header.Payload.Signature</text>
  </g>
  <line x1="280" y1="396" x2="280" y2="420" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: 客户端存储 Token -->
  <g class="c-teal">
    <rect x="180" y="422" width="200" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="280" y="444" text-anchor="middle" dominant-baseline="central">客户端存储 Token</text>
    <text class="ts" x="280" y="462" text-anchor="middle" dominant-baseline="central">localStorage / Cookie</text>
  </g>
  <line x1="280" y1="478" x2="280" y2="502" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5: 携带 Token 请求 -->
  <g class="c-teal">
    <rect x="180" y="504" width="200" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="280" y="526" text-anchor="middle" dominant-baseline="central">携带 Token 请求资源</text>
    <text class="ts" x="280" y="544" text-anchor="middle" dominant-baseline="central">Authorization: Bearer {JWT}</text>
  </g>
  <line x1="280" y1="560" x2="280" y2="584" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 6: 验证签名 -->
  <g class="c-purple">
    <rect x="180" y="586" width="200" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="280" y="608" text-anchor="middle" dominant-baseline="central">服务器验证签名</text>
    <text class="ts" x="280" y="626" text-anchor="middle" dominant-baseline="central">Base64 解码 + HMAC 校验</text>
  </g>
  <line x1="280" y1="642" x2="280" y2="666" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Diamond 2: 签名有效? (width=140, height=70) -->
  <g class="c-amber">
    <polygon points="280,668 350,703 280,738 210,703" stroke-width="0.5"/>
    <text class="th" x="280" y="703" text-anchor="middle" dominant-baseline="central">签名有效?</text>
  </g>
  <text class="ts" x="294" y="746" fill="#3B6D11">是</text>
  <line x1="280" y1="738" x2="280" y2="766" stroke="#3B6D11" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="358" y="696" fill="#A32D2D">否</text>
  <line x1="350" y1="703" x2="440" y2="703" stroke="#A32D2D" stroke-width="1" stroke-dasharray="5 3"/>

  <!-- Diamond 3: Token 过期? (width=140, height=70) -->
  <g class="c-amber">
    <polygon points="280,768 350,803 280,838 210,803" stroke-width="0.5"/>
    <text class="th" x="280" y="803" text-anchor="middle" dominant-baseline="central">Token 过期?</text>
  </g>
  <text class="ts" x="294" y="846" fill="#3B6D11">否</text>
  <line x1="280" y1="838" x2="280" y2="866" stroke="#3B6D11" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="358" y="796" fill="#A32D2D">是</text>
  <line x1="350" y1="803" x2="440" y2="803" stroke="#A32D2D" stroke-width="1" stroke-dasharray="5 3"/>

  <!-- Step 7: 返回数据 (success) -->
  <g class="c-green">
    <rect x="180" y="868" width="200" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="280" y="890" text-anchor="middle" dominant-baseline="central">处理请求，返回数据</text>
    <text class="ts" x="280" y="908" text-anchor="middle" dominant-baseline="central">200 OK { data }</text>
  </g>
  <line x1="280" y1="924" x2="280" y2="948" stroke="#3B6D11" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- End (success) -->
  <circle cx="280" cy="964" r="16" fill="none" stroke="#3B6D11" stroke-width="2"/>
  <circle cx="280" cy="964" r="8" fill="#3B6D11"/>
  <text class="ts" x="280" y="986" text-anchor="middle" fill="#3B6D11">认证成功</text>

  <!-- ===== Error path (right side) ===== -->

  <!-- Vertical collector line: y=275 → y=803 -->
  <line x1="440" y1="275" x2="440" y2="803" stroke="#A32D2D" stroke-width="1" stroke-dasharray="5 3"/>

  <!-- Collector → Error box -->
  <line x1="440" y1="803" x2="448" y2="803" stroke="#A32D2D" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>

  <!-- Error box -->
  <g class="c-red">
    <rect x="450" y="773" width="150" height="60" rx="8" stroke-width="0.5"/>
    <text class="th" x="525" y="797" text-anchor="middle" dominant-baseline="central">返回 401</text>
    <text class="ts" x="525" y="817" text-anchor="middle" dominant-baseline="central">Unauthorized</text>
  </g>
  <line x1="525" y1="833" x2="525" y2="862" stroke="#A32D2D" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- End (fail) -->
  <circle cx="525" cy="878" r="16" fill="none" stroke="#A32D2D" stroke-width="2"/>
  <circle cx="525" cy="878" r="8" fill="#A32D2D"/>
  <text class="ts" x="525" y="904" text-anchor="middle" fill="#A32D2D">认证失败</text>

  <!-- ===== Legend ===== -->
  <line x1="40" y1="1010" x2="70" y2="1010" stroke="#3B6D11" stroke-width="1.5"/>
  <text class="ts" x="76" y="1014" dominant-baseline="central">正常路径</text>
  <line x1="160" y1="1010" x2="190" y2="1010" stroke="#A32D2D" stroke-width="1" stroke-dasharray="5 3"/>
  <text class="ts" x="196" y="1014" dominant-baseline="central">错误路径</text>
</svg>
